# VibeLife Spigot Plugin Configuration

# Fastify sidecar connection
sidecar:
  url: "http://localhost:3000"
  # API key for server-to-server calls (economy transfers, etc.)
  api-key: "change-me-in-production"
  # Connection timeout in milliseconds
  timeout-ms: 5000

# Plugin message channel for Fabric mod communication
channel: "vibelife:main"

# Region mapping: MC world name -> VibeLife region ID
regions:
  world: "aurora-docks"
  world_nether: "nether-realm"
  world_the_end: "end-realm"
