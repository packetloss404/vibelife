name: VibeLife
version: '${version}'
main: com.vibelife.spigot.VibeLifePlugin
api-version: '1.21'
description: VibeLife social features bridge for Minecraft
authors: [VibeLife]
depend: []
softdepend: [Vault, WorldGuard]
commands:
  vibelife:
    description: VibeLife main command
    usage: /<command> [subcommand]
    aliases: [vl]
  parcel:
    description: Manage parcels (land claims)
    usage: /<command> [info|claim|release|list]
    aliases: [plot, land]
  friends:
    description: Manage friends
    usage: /<command> [add|remove|list]
  market:
    description: Open marketplace
    usage: /<command>
  balance:
    description: Check currency balance
    usage: /<command>
  pay:
    description: Send currency to a player
    usage: /<command> <player> <amount>
permissions:
  vibelife.admin:
    description: VibeLife admin permissions
    default: op
