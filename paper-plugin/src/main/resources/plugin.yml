name: PacketCraft
version: '${version}'
main: com.packetcraft.paper.PacketCraftPlugin
api-version: '1.21'
description: PacketCraft social features bridge for Minecraft
authors: [PacketCraft]
depend: []
softdepend: [Vault, WorldGuard]
commands:
  packetcraft:
    description: PacketCraft main command
    usage: /<command> [subcommand]
    aliases: [pc]
  parcel:
    description: Manage parcels (land claims)
    usage: /<command> [info|claim|release|list]
    aliases: [plot, land]
  friends:
    description: Manage friends
    usage: /<command> [add|remove|list]
  market:
    description: Open marketplace
    usage: /<command>
  balance:
    description: Check currency balance
    usage: /<command>
  pay:
    description: Send currency to a player
    usage: /<command> <player> <amount>
permissions:
  packetcraft.admin:
    description: PacketCraft admin permissions
    default: op
